# Stage 1 preprocessing config
preprocessing:
  target_shape: [128, 128, 128]
  target_spacing: [1.0, 1.0, 1.0]
  skull_strip_method: "none"        # "hdbet" | "synthstrip" | "none"
  bias_correct: true
  register_to_atlas: false
  atlas_path: null                  # data/raw/atlases/SRI24/SRI24_T1.nii.gz when downloaded
  normalize: "zscore"               # "zscore" | "minmax" | "percentile"
  extract_patches: false
  patch_size: [96, 96, 96]
  n_patches: 4
  modalities: ["T1", "T1ce", "T2", "FLAIR"]

datasets:
  primary: "TextBraTS"
  fallback: "BraTS2021"
  caption_proxy: "ROCOv2-brain"
  segmentation_only:
    - "BraTS2020"
    - "BraTS2021"
    - "BraTS2023-AdultGlioma"
  raw_root: "data/raw"
  processed_root: "data/processed"
  synthetic_root: "data/synthetic"
